name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  APP_NAME: online-book-shop
  IMAGE_NAME: online-book-shop
  APP_PORT: "8080"
  JWT_ACTION_EXPIRATION: ${{ secrets.JWT_ACTION_EXPIRATION }}
  JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
  JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  MAIL: ${{ secrets.MAIL }}
  SERVER_PATH: ${{ secrets.SERVER_PATH }}
  HETZNER_USER: ${{ secrets.HETZNER_USER || 'root' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        if: github.event_name == 'pull_request'
        run: mvn -B test -Dspring.profiles.active=test

      - name: Package application
        run: mvn -B package -DskipTests

      - name: Build Docker image
        if: github.event_name == 'push'
        run: docker build -t "$IMAGE_NAME:latest" .

      - name: Export Docker image
        if: github.event_name == 'push'
        run: |
          mkdir -p deploy
          docker save "$IMAGE_NAME:latest" -o "deploy/$APP_NAME.tar"

      - name: Upload image to Hetzner
        if: github.event_name == 'push'
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HETZNER_HOST }}
          REMOTE_USER: ${{ env.HETZNER_USER }}
          REMOTE_PORT: ${{ secrets.HETZNER_PORT || '22' }}
          SOURCE: deploy/
          TARGET: ${{ secrets.HETZNER_DEPLOY_PATH }}
          ARGS: -rlgoDzvc

      - name: Restart container on Hetzner
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.0
        env:
          TARGET: ${{ secrets.HETZNER_DEPLOY_PATH }}
          DOCKER_NETWORK: ${{ secrets.HETZNER_DOCKER_NETWORK }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_LIQUIBASE_CHANGE_LOG: /db/changelog/db.changelog-master.yaml
          MAIL: legimus@adammudrak.pp.ua
          SERVER_PATH: https://legimus.adammudrak.pp.ua
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ env.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || '22' }}
          envs: APP_NAME,IMAGE_NAME,APP_PORT,TARGET,DOCKER_NETWORK,SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,SPRING_LIQUIBASE_CHANGE_LOG,JWT_ACTION_EXPIRATION,JWT_ACCESS_EXPIRATION,JWT_REFRESH_EXPIRATION,JWT_SECRET,RESEND_API_KEY,MAIL,SERVER_PATH
          script: |
            set -e
            docker load -i "$TARGET/$APP_NAME.tar"
            docker rm -f "$APP_NAME" 2>/dev/null || true

            ENV_FILE_ARG=""
            if [ -f "$TARGET/.env" ]; then
              ENV_FILE_ARG="--env-file $TARGET/.env"
            fi

            NETWORK_ARG=""
            if [ -n "$DOCKER_NETWORK" ]; then
              NETWORK_ARG="--network $DOCKER_NETWORK"
            fi

            docker run -d \
              --name "$APP_NAME" \
              --restart unless-stopped \
              $ENV_FILE_ARG \
              $NETWORK_ARG \
              -e SERVER_PORT="$APP_PORT" \
              -e SPRING_DATASOURCE_URL="$SPRING_DATASOURCE_URL" \
              -e SPRING_DATASOURCE_USERNAME="$SPRING_DATASOURCE_USERNAME" \
              -e SPRING_DATASOURCE_PASSWORD="$SPRING_DATASOURCE_PASSWORD" \
              -e SPRING_LIQUIBASE_CHANGE_LOG="$SPRING_LIQUIBASE_CHANGE_LOG" \
              -e JWT_ACTION_EXPIRATION="$JWT_ACTION_EXPIRATION" \
              -e JWT_ACCESS_EXPIRATION="$JWT_ACCESS_EXPIRATION" \
              -e JWT_REFRESH_EXPIRATION="$JWT_REFRESH_EXPIRATION" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e RESEND_API_KEY="$RESEND_API_KEY" \
              -e MAIL="$MAIL" \
              -e SERVER_PATH="$SERVER_PATH" \
              -p "$APP_PORT:$APP_PORT" \
              "$IMAGE_NAME:latest"

            rm -f "$TARGET/$APP_NAME.tar"
