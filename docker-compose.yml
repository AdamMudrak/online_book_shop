services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-legimus_db}
      MYSQL_USER: ${SPRING_DATASOURCE_USERNAME:-legimus_user}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-legimus_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-legimus_db}?serverTimeZone=UTC
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-legimus_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-legimus_pass}
      JWT_ACTION_EXPIRATION: ${JWT_ACTION_EXPIRATION:-600000}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-at-least-32-bytes}
      RESEND_API_KEY: ${RESEND_API_KEY:-local-resend-api-key}
      MAIL: ${MAIL:-no-reply@example.com}
      SERVER_PATH: ${SERVER_PATH:-http://localhost:8080}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
